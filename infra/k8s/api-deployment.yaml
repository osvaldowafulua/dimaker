apiVersion: apps/v1
kind: Deployment
metadata:
  name: dimaker-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dimaker-api
  template:
    metadata:
      labels:
        app: dimaker-api
    spec:
      containers:
        - name: api
          image: dimaker/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: dimaker-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 10
